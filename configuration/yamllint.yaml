---
extends: default

yaml-files:
  - '*.yaml'
  - '*.yml'

ignore:
  - pnpm-lock.yaml

rules:
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
    min-spaces-inside-empty: 0
    max-spaces-inside-empty: 0

  brackets:
    forbid: false
    min-spaces-inside: 0
    max-spaces-inside: 1
    min-spaces-inside-empty: 0
    max-spaces-inside-empty: 0

  colons:
    max-spaces-before: 0
    max-spaces-after: 1

  commas:
    max-spaces-before: 0
    min-spaces-after: 1
    max-spaces-after: 1

  comments:
    require-starting-space: false
    ignore-shebangs: true
    min-spaces-from-content: 1

  empty-lines:
    max: 1
    max-start: 1
    max-end: 1

  hyphens:
    max-spaces-after: 1

  indentation:
    spaces: consistent
    indent-sequences: true
    check-multi-line-strings: false

  key-duplicates: enable

  line-length: disable

  new-line-at-end-of-file: enable
  new-lines:
    type: unix

  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: false

  quoted-strings:
    quote-type: any # TODO change to 'consistent' when upgrading to version >=1.38.0
    required: only-when-needed
    allow-quoted-quotes: false
    check-keys: false

  trailing-spaces: enable
