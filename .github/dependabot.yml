---
version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    cooldown:
      default-days: 7
    schedule:
      interval: monthly
    assignees: [ georglauterbach ]
    labels:
      - kind::update
      - area::ci

  - package-ecosystem: docker
    directory: /
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
    labels:
      - kind::update
      - area::code
